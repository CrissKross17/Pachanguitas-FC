<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diseños de Cartas — Contorno FIFA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px 60px;
  font-family: 'Barlow Condensed', sans-serif;
  gap: 48px;
}
h1 { color: #555; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
.row { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; justify-content: center; }
.col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.lbl { color: #555; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.card { width: 160px; height: 224px; position: relative; }
.card svg { position: absolute; inset: 0; width: 100%; height: 100%; }

/* Overlaid content */
.ovr  { position: absolute; top: 22px; left: 14px; z-index: 10; line-height: 1; filter: drop-shadow(0 1px 6px rgba(0,0,0,1)); }
.ovr .n { font-size: 20px; font-weight: 900; }
.ovr .l { font-size: 7px; font-weight: 700; letter-spacing: 2px; margin-top: 1px; }
.sil  { position: absolute; bottom: 39%; left: 50%; transform: translateX(-50%); width: 54%; z-index: 2; opacity: 0.5; }
.panel { position: absolute; bottom: 0; left: 0; right: 0; height: 37%; z-index: 3; display: flex; flex-direction: column; padding: 5px 10px 6px; }
.pname { font-size: 12px; font-weight: 900; color: #fff; text-align: center; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 1px 8px #000; margin-bottom: 3px; }
.sgrid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; flex: 1; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 3px; }
.sc { text-align: center; display: flex; flex-direction: column; justify-content: center; }
.sv { font-size: 12px; font-weight: 900; line-height: 1; }
.sl { font-size: 6px; font-weight: 700; text-transform: uppercase; opacity: 0.6; color: #fff; margin-top: 1px; }
</style>
</head>
<body>

<h1>Contorno de cartas — estilo FIFA</h1>

<div class="row">

<!-- ═══════════════════════════════
     BRONCE (rojo)
═══════════════════════════════ -->

        <clipPath id="clip1">
          <polygon points="18,0 182,0 200,18 200,262 182,280 18,280 0,262 0,18"/>
        </clipPath>
      </defs>

      <!-- BG fill -->
      <polygon points="18,0 182,0 200,18 200,262 182,280 18,280 0,262 0,18" fill="url(#bg1)"/>

      <!-- Subtle inner glow -->

      <!-- Outer border -->

      <!-- Inner border -->
      <polygon points="22,5 178,5 195,22 195,258 178,275 22,275 5,258 5,22" fill="none" stroke="#ff5522" stroke-width="1" opacity="0.5"/>

      <!-- Stats panel bg -->
      <polygon points="18,172 182,172 200,190 200,262 182,280 18,280 0,262 0,190" fill="url(#panel1)"/>
      <!-- Panel top border -->
      <line x1="0" y1="172" x2="200" y2="172" stroke="url(#br1)" stroke-width="1.5" opacity="0.8"/>

      <!-- ── TOP ORNAMENT ── -->

      <polygon points="100,0 107,7 100,14 93,7" fill="#ff5522" opacity="0.9"/>
      <polygon points="100,2 105,7 100,12 95,7" fill="#ff8866" opacity="0.7"/>
      <!-- Side dots -->
      <circle cx="80" cy="5" r="2" fill="#ff4411" opacity="0.6"/>
      <circle cx="120" cy="5" r="2" fill="#ff4411" opacity="0.6"/>
      <!-- Short horizontal lines flanking gem -->
      <line x1="30" y1="5" x2="68" y2="5" stroke="#ff4411" stroke-width="1" opacity="0.4"/>
      <line x1="132" y1="5" x2="170" y2="5" stroke="#ff4411" stroke-width="1" opacity="0.4"/>

      <!-- ── CORNER MARKS ── -->
      <path d="M8 26 L8 40" stroke="#ff5522" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M192 26 L192 40" stroke="#ff5522" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M8 254 L8 240" stroke="#ff5522" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M192 254 L192 240" stroke="#ff5522" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

      <!-- ── BOTTOM WINGS ── -->
      <path d="M100 275 Q70 268 35 273 Q60 262 100 265 Z" fill="#ff4411" opacity="0.35"/>
      <path d="M100 275 Q130 268 165 273 Q140 262 100 265 Z" fill="#ff4411" opacity="0.35"/>
      <circle cx="100" cy="267" r="2.5" fill="#ff6644" opacity="0.7"/>
    </svg>

    <div class="ovr" style="color:#ff6644;"><div class="n">3.2</div><div class="l">OVR</div></div>
    <svg class="sil" viewBox="0 0 100 115"><ellipse cx="50" cy="24" rx="19" ry="22" fill="#ff4422"/><path d="M14 115 Q14 74 50 70 Q86 74 86 115Z" fill="#ff4422"/></svg>
    <div class="panel">
      <div class="pname">Cristian</div>
      <div class="sgrid">
        <div class="sc"><div class="sv" style="color:#ff6644">3.2</div><div class="sl">CAM</div></div>
        <div class="sc"><div class="sv" style="color:#ff6644">2.8</div><div class="sl">POR</div></div>
        <div class="sc"><div class="sv" style="color:#fff">4</div><div class="sl">GOL</div></div>
        <div class="sc"><div class="sv" style="color:#fff">8</div><div class="sl">JJ</div></div>
      </div>
    </div>
  </div>
</div>
