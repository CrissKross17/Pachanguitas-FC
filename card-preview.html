<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diseños de Cartas — Contorno FIFA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 70px;
  font-family: 'Barlow Condensed', sans-serif;
  gap: 52px;
}
h1 { color: #444; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
.row { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
.col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.lbl { color: #444; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

/* Card container — matches SVG viewBox ratio 200:284 */
.card {
  width: 180px;
  height: 256px;
  position: relative;
}
.card svg.frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* OVR badge top-left */
.ovr {
  position: absolute;
  top: 18%;
  left: 9%;
  z-index: 10;
  line-height: 1;
  filter: drop-shadow(0 1px 8px rgba(0,0,0,0.9));
}
.ovr .n { font-size: 22px; font-weight: 900; }
.ovr .l { font-size: 7px; font-weight: 700; letter-spacing: 2px; margin-top: 2px; }

/* Silhouette */
.sil {
  position: absolute;
  bottom: 38%;
  left: 50%;
  transform: translateX(-50%);
  width: 52%;
  z-index: 2;
  opacity: 0.45;
}

/* Bottom stats panel */
.panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 36%;
  z-index: 3;
  display: flex;
  flex-direction: column;
  padding: 5px 12px 8px;
}
.pname {
  font-size: 11px; font-weight: 900; color: #fff;
  text-align: center; letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 1px 8px #000; margin-bottom: 3px;
}
.sgrid {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
  flex: 1;
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 3px;
}
.sc { text-align: center; display: flex; flex-direction: column; justify-content: center; }
.sv { font-size: 13px; font-weight: 900; line-height: 1; }
.sl { font-size: 6px; font-weight: 700; text-transform: uppercase; opacity: 0.55; color: #fff; margin-top: 1px; }
</style>
</head>
<body>

<h1>Contorno de cartas — estilo FIFA</h1>
