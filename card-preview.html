<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diseños de Cartas — Contorno FIFA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 80px;
  font-family: 'Barlow Condensed', sans-serif;
  gap: 52px;
}
h1 { color: #444; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
.row { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
.col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.lbl { color: #444; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

/*
  viewBox: 0 0 260 360
  Shape (from Copilot, adjusted):
    Outer:  M30,10 H230 L250,60 V275 L130,350 L10,275 V60 Z
    Inner1: M40,20 H220 L238,66 V271 L130,338 L22,271 V66 Z
    Inner2: M50,30 H210 L226,72 V267 L130,326 L34,267 V72 Z  (Oro only)
    Panel:  from y=240 down
*/
.card { width: 156px; height: 216px; position: relative; }
.card svg.frame { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

.ovr  { position: absolute; top: 14%; left: 8%; z-index: 10; line-height: 1;
        filter: drop-shadow(0 1px 8px rgba(0,0,0,.9)); }
.ovr .n { font-size: 22px; font-weight: 900; }
.ovr .l { font-size: 7px; font-weight: 700; letter-spacing: 2px; margin-top: 2px; }
.sil  { position: absolute; bottom: 36%; left: 50%; transform: translateX(-50%);
        width: 48%; z-index: 2; opacity: 0.42; }
.panel { position: absolute; bottom: 0; left: 0; right: 0; height: 33%;
         z-index: 3; display: flex; flex-direction: column; padding: 5px 12px 8px; }
.pname { font-size: 11px; font-weight: 900; color: #fff; text-align: center;
         letter-spacing: 2px; text-transform: uppercase;
         text-shadow: 0 1px 8px #000; margin-bottom: 3px; }
.sgrid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; flex: 1;
         border-top: 1px solid rgba(255,255,255,0.12); padding-top: 3px; }
.sc { text-align: center; display: flex; flex-direction: column; justify-content: center; }
.sv { font-size: 13px; font-weight: 900; line-height: 1; }
.sl { font-size: 6px; font-weight: 700; text-transform: uppercase;
      opacity: 0.55; color: #fff; margin-top: 1px; }
</style>
</head>
<body>
<h1>Contorno de cartas — estilo FIFA</h1>

<div class="row">

<!-- ══════════════════════
     BRONCE
══════════════════════ -->

        <line x1="130" y1="350" x2="14"  y2="264"/>
        <line x1="130" y1="350" x2="42"  y2="272"/>
        <line x1="130" y1="350" x2="74"  y2="282"/>
        <line x1="130" y1="350" x2="106" y2="292"/>
        <line x1="130" y1="350" x2="154" y2="292"/>
        <line x1="130" y1="350" x2="186" y2="282"/>
        <line x1="130" y1="350" x2="218" y2="272"/>

      <path d="M242,72 L242,92" stroke="#ff5522" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

      <path d="M242,222 L242,242" stroke="#ff5522" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    </svg>

    <div class="ovr" style="color:#ff7755;"><div class="n">3.2</div><div class="l">OVR</div></div>

      <ellipse cx="50" cy="24" rx="19" ry="22" fill="#ff4422"/>
      <path d="M14 115 Q14 74 50 70 Q86 74 86 115Z" fill="#ff4422"/>
    </svg>
    <div class="panel">
      <div class="pname">Cristian</div>
      <div class="sgrid">
        <div class="sc"><div class="sv" style="color:#ff7755">3.2</div><div class="sl">CAM</div></div>
        <div class="sc"><div class="sv" style="color:#ff7755">2.8</div><div class="sl">POR</div></div>
        <div class="sc"><div class="sv" style="color:#fff">4</div><div class="sl">GOL</div></div>
        <div class="sc"><div class="sv" style="color:#fff">8</div><div class="sl">JJ</div></div>
      </div>
    </div>
  </div>
</div>
